name: ci-test

# CI test pipeline (Phase 5, design §3.2): runs on every PR + push to main.
# Three jobs in parallel — Python, Java, frontend — each gating merge.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

defaults:
  run:
    working-directory: worldcup-predictor

jobs:
  python:
    name: python · ruff + pytest
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.9
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
          cache: pip

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt || pip install -r requirements.txt

      - name: Lint (ruff)
        run: ruff check src tests || true   # design §3.2 step 1 — non-blocking until full clean-up

      - name: Type-check (mypy, src only)
        run: mypy src || true

      - name: Run pytest
        env:
          DATABASE_URL: "sqlite:///:memory:"
          REDIS_URL: "redis://localhost:6379/0"
        run: pytest --maxfail=1 --disable-warnings -q

  java:
    name: java · gradle test
    runs-on: ubuntu-22.04
    defaults:
      run:
        working-directory: worldcup-predictor/java-api
    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Build & test
        run: ./gradlew test --no-daemon

  frontend:
    name: frontend · lint + typecheck
    runs-on: ubuntu-22.04
    defaults:
      run:
        working-directory: worldcup-predictor/frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: worldcup-predictor/frontend/package-lock.json

      - name: Install deps
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type-check
        run: npm run typecheck

      - name: Build
        run: npm run build

  trivy:
    name: security · trivy fs scan
    runs-on: ubuntu-22.04
    needs: [python, java, frontend]
    steps:
      - uses: actions/checkout@v4
      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@0.24.0
        with:
          scan-type: fs
          scan-ref: worldcup-predictor
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: '0'   # advisory only for now
