name: ci-build

# CI build pipeline (Phase 5, design §3.3 step 1-2). Builds and pushes
# multi-arch Docker images for every service when `main` advances.

on:
  push:
    branches: [main]
    tags: ['v*.*.*']

permissions:
  contents: read
  packages: write
  id-token: write

env:
  REGISTRY: ghcr.io
  IMAGE_OWNER: ${{ github.repository_owner }}

jobs:
  build:
    name: build · ${{ matrix.service }}
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: ml-api
            context: worldcup-predictor
            dockerfile: worldcup-predictor/Dockerfile
          - service: card-worker
            context: worldcup-predictor
            dockerfile: worldcup-predictor/Dockerfile.card-worker
          - service: java-api
            context: worldcup-predictor/java-api
            dockerfile: worldcup-predictor/java-api/Dockerfile
          - service: frontend
            context: worldcup-predictor/frontend
            dockerfile: worldcup-predictor/frontend/Dockerfile
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/wcp-${{ matrix.service }}
          tags: |
            type=sha,prefix=,format=short
            type=ref,event=branch
            type=semver,pattern={{version}}

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,scope=${{ matrix.service }},mode=max

  trigger-helm-cd:
    name: trigger · worldcup-helm cd-dev
    runs-on: ubuntu-22.04
    needs: build
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
    steps:
      - name: Dispatch deploy-dev to worldcup-helm
        env:
          # Fine-grained PAT, scoped to HongxingSoccer/worldcup-helm only,
          # with permissions: actions:write + metadata:read.
          GH_TOKEN: ${{ secrets.HELM_REPO_DISPATCH_TOKEN }}
        run: |
          # Pass the short SHA — matches docker/metadata-action's `type=sha,format=short`
          # output, which is the tag the build job actually pushed to ECR.
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          gh api repos/HongxingSoccer/worldcup-helm/dispatches \
            -f event_type=deploy-dev \
            -f client_payload[image_tag]="$SHORT_SHA" \
            && echo "Dispatched deploy-dev to worldcup-helm with tag=$SHORT_SHA" \
            || echo "::warning::dispatch failed — verify HELM_REPO_DISPATCH_TOKEN secret is set"
