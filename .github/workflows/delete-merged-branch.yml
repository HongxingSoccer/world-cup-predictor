name: Delete Merged Branch

on:
  pull_request:
    types:
      - closed

jobs:
  delete-branch:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Delete head branch after merge
        uses: actions/github-script@v7
        with:
          script: |
            const ref = context.payload.pull_request.head.ref;
            // Do not delete the default branch or protected branches
            const defaultBranch = context.payload.repository.default_branch;
            if (ref === defaultBranch) {
              console.log(`Skipping deletion of default branch: ${ref}`);
              return;
            }
            try {
              await github.rest.git.deleteRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: `heads/${ref}`,
              });
              console.log(`Successfully deleted branch: ${ref}`);
            } catch (error) {
              console.log(`Could not delete branch "${ref}": ${error.message}`);
            }