worker_processes auto;
pid /tmp/nginx.pid;

events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Performance defaults — keepalive + sendfile help with the static-asset
    # / SSR mixed workload Next.js produces.
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    server_tokens off;
    client_max_body_size 8m;

    # Pretty access log so the docker logs are easy to read.
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" rt=$request_time';
    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    # gzip — Next.js already pre-compresses static; gzip catches the SSR HTML.
    gzip on;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_proxied any;
    gzip_types
        application/javascript
        application/json
        application/x-javascript
        application/xml
        application/xml+rss
        application/atom+xml
        image/svg+xml
        text/css
        text/plain
        text/xml;

    upstream wcp_java_api {
        server java-api:8080;
        keepalive 16;
    }
    upstream wcp_frontend {
        server frontend:3000;
        keepalive 32;
    }

    server {
        listen 80;
        server_name _;

        # --- Java business API ---
        location /api/v1/ {
            proxy_pass http://wcp_java_api;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # --- Short-link redirect (java-api owns /s/{code}) ---
        location /s/ {
            proxy_pass http://wcp_java_api;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # --- Static asset cache (Next.js _next/static is content-hashed) ---
        location /_next/static/ {
            proxy_pass http://wcp_frontend;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # --- Everything else → Next.js (SSR + RSC) ---
        location / {
            proxy_pass http://wcp_frontend;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Phase 5: switch to listen 443 ssl + Let's Encrypt via cert-manager.
    }
}
