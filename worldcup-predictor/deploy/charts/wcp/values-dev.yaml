# Dev overrides. Replica counts halved, max replicas trimmed; cheaper IRSA
# roles. Real ACM cert + account ID still need to be filled in by Phase 0.

global:
  environment: dev
  domain: dev.wcp.example.com
  aws:
    accountId: "000000000000"          # FIXME — set by Phase 0 Terraform
    region: us-east-1
    certificateArn: ""                 # FIXME — ACM arn for dev.wcp.example.com
  image:
    registry: "000000000000.dkr.ecr.us-east-1.amazonaws.com"
    tag: ""                            # CD pipeline injects $GIT_SHA

wcp-frontend:
  enabled: true
  replicaCount: 1
  autoscaling:
    minReplicas: 1
    maxReplicas: 2

wcp-java-api:
  enabled: true
  replicaCount: 1
  autoscaling:
    minReplicas: 1
    maxReplicas: 3
  serviceAccount:
    annotations:
      eks.amazonaws.com/role-arn: ""   # FIXME — arn:aws:iam::<acct>:role/wcp-dev-java-api

wcp-ml-api:
  enabled: true
  replicaCount: 1
  autoscaling:
    minReplicas: 1
    maxReplicas: 3
  serviceAccount:
    annotations:
      eks.amazonaws.com/role-arn: ""   # FIXME — wcp-dev-ml-api role

wcp-workers:
  enabled: true
  workers:
    ingestion:
      keda:
        maxReplicaCount: 2
    card:
      replicaCount: 1
      keda:
        maxReplicaCount: 2
    reports:
      replicaCount: 1
      keda:
        maxReplicaCount: 2
  serviceAccount:
    annotations:
      eks.amazonaws.com/role-arn: ""   # FIXME — wcp-dev-workers role
  mlflow:
    serviceAccount:
      annotations:
        eks.amazonaws.com/role-arn: ""  # FIXME — wcp-dev-mlflow role

ingress:
  enabled: true
  extraAnnotations:
    alb.ingress.kubernetes.io/group.name: wcp-dev
