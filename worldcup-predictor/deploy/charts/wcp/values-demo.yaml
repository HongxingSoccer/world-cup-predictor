# Demo environment — full HA defaults (2-replica baseline + topology spread).
# Only fills in cloud-account specifics; keeps sub-chart values at defaults.

global:
  environment: demo
  domain: demo.wcp.example.com
  aws:
    accountId: "000000000000"          # FIXME — Phase 0 Terraform output
    region: us-east-1
    certificateArn: ""                 # FIXME — ACM arn for demo.wcp.example.com
  image:
    registry: "000000000000.dkr.ecr.us-east-1.amazonaws.com"
    tag: ""

wcp-frontend:
  enabled: true
wcp-java-api:
  enabled: true
  serviceAccount:
    annotations:
      eks.amazonaws.com/role-arn: ""   # FIXME — wcp-demo-java-api role
wcp-ml-api:
  enabled: true
  serviceAccount:
    annotations:
      eks.amazonaws.com/role-arn: ""   # FIXME — wcp-demo-ml-api role
wcp-workers:
  enabled: true
  serviceAccount:
    annotations:
      eks.amazonaws.com/role-arn: ""   # FIXME — wcp-demo-workers role
  mlflow:
    serviceAccount:
      annotations:
        eks.amazonaws.com/role-arn: ""  # FIXME — wcp-demo-mlflow role

ingress:
  enabled: true
  extraAnnotations:
    alb.ingress.kubernetes.io/group.name: wcp-demo
