{{- if .Values.externalSecrets.enabled -}}
{{- range $secret := .Values.externalSecrets.secrets }}
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ $secret.name }}
  labels:
    {{- include "wcp.labels" $ | nindent 4 }}
spec:
  refreshInterval: {{ $.Values.externalSecrets.refreshInterval }}
  secretStoreRef:
    name: {{ $.Values.global.aws.clusterSecretStore }}
    kind: ClusterSecretStore
  target:
    name: {{ $secret.name }}
    creationPolicy: Owner
  data:
    {{- range $item := $secret.items }}
    - secretKey: {{ $item.secretKey }}
      remoteRef:
        key: {{ include "wcp.secretRemoteKey" (dict "ctx" $ "key" $item.remoteKey) }}
    {{- end }}
{{- end }}
{{- end }}
