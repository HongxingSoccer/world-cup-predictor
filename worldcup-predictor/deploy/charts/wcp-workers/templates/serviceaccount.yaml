{{- if .Values.serviceAccount.create -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "wcp-workers.serviceAccountName" . }}
  labels:
    app.kubernetes.io/name: {{ include "wcp-workers.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    {{- include "wcp-workers.commonLabels" . | nindent 4 }}
  {{- with .Values.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
automountServiceAccountToken: true
{{- end }}
{{- if and .Values.mlflow.enabled .Values.mlflow.serviceAccount.create }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "wcp-workers.mlflowServiceAccountName" . }}
  labels:
    app.kubernetes.io/name: {{ .Values.mlflow.name }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    {{- include "wcp-workers.commonLabels" . | nindent 4 }}
  {{- with .Values.mlflow.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
automountServiceAccountToken: true
{{- end }}
