{{- if .Values.mlflow.enabled -}}
{{- $m := .Values.mlflow -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $m.name }}
  labels:
    app.kubernetes.io/name: {{ $m.name }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    {{- include "wcp-workers.commonLabels" . | nindent 4 }}
spec:
  replicas: {{ $m.replicaCount }}
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ $m.name }}
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ $m.name }}
        app.kubernetes.io/instance: {{ .Release.Name }}
        {{- include "wcp-workers.commonLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "wcp-workers.mlflowServiceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: mlflow
          image: {{ include "wcp-workers.componentImage" $m.image | quote }}
          imagePullPolicy: {{ $m.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.containerSecurityContext | nindent 12 }}
          {{- with $m.command }}
          command:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with $m.args }}
          args:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          ports:
            - name: http
              containerPort: {{ $m.service.port }}
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ .Values.envFrom.configMapName }}
                optional: true
            - secretRef:
                name: {{ .Values.envFrom.secretName }}
                optional: true
          env:
            {{- range $k, $v := $m.env }}
            - name: {{ $k }}
              value: {{ $v | quote }}
            {{- end }}
          livenessProbe:
            httpGet:
              path: {{ $m.probes.liveness.path }}
              port: http
            initialDelaySeconds: {{ $m.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ $m.probes.liveness.periodSeconds }}
            failureThreshold: {{ $m.probes.liveness.failureThreshold }}
          readinessProbe:
            httpGet:
              path: {{ $m.probes.readiness.path }}
              port: http
            initialDelaySeconds: {{ $m.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ $m.probes.readiness.periodSeconds }}
            failureThreshold: {{ $m.probes.readiness.failureThreshold }}
          resources:
            {{- toYaml $m.resources | nindent 12 }}
{{- end }}
