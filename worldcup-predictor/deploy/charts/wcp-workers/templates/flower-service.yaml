{{- if .Values.flower.enabled -}}
{{- $f := .Values.flower -}}
apiVersion: v1
kind: Service
metadata:
  name: {{ $f.name }}
  labels:
    app.kubernetes.io/name: {{ $f.name }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    {{- include "wcp-workers.commonLabels" . | nindent 4 }}
spec:
  type: {{ $f.service.type }}
  ports:
    - port: {{ $f.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/name: {{ $f.name }}
    app.kubernetes.io/instance: {{ .Release.Name }}
{{- end }}
