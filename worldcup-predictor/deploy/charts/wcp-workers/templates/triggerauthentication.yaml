{{/*
KEDA TriggerAuthentication pulls REDIS_URL from the umbrella's Secret so the
ScaledObject's Redis trigger can reach the broker. Rendered once, shared by
every ScaledObject in this chart.
*/}}
{{- $needAuth := false -}}
{{- range $name, $w := .Values.workers -}}
  {{- if and $w.enabled $w.keda.enabled -}}{{- $needAuth = true -}}{{- end -}}
{{- end -}}
{{- if $needAuth -}}
apiVersion: keda.sh/v1alpha1
kind: TriggerAuthentication
metadata:
  name: {{ printf "%s-redis-auth" (include "wcp-workers.name" .) }}
  labels:
    app.kubernetes.io/name: {{ include "wcp-workers.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    {{- include "wcp-workers.commonLabels" . | nindent 4 }}
spec:
  secretTargetRef:
    - parameter: address
      name: {{ .Values.keda.secretRef.name }}
      key: {{ .Values.keda.secretRef.addressKey }}
{{- end }}
