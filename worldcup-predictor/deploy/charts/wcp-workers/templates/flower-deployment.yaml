{{- if .Values.flower.enabled -}}
{{- $f := .Values.flower -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $f.name }}
  labels:
    app.kubernetes.io/name: {{ $f.name }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    {{- include "wcp-workers.commonLabels" . | nindent 4 }}
spec:
  replicas: {{ $f.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ $f.name }}
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ $f.name }}
        app.kubernetes.io/instance: {{ .Release.Name }}
        {{- include "wcp-workers.commonLabels" . | nindent 8 }}
    spec:
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: flower
          image: {{ include "wcp-workers.componentImage" $f.image | quote }}
          imagePullPolicy: {{ $f.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.containerSecurityContext | nindent 12 }}
          {{- with $f.command }}
          command:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with $f.args }}
          args:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          ports:
            - name: http
              containerPort: {{ $f.service.port }}
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ .Values.envFrom.configMapName }}
                optional: true
            - secretRef:
                name: {{ .Values.envFrom.secretName }}
                optional: true
          env:
            # Flower reads CELERY_BROKER_URL; map our REDIS_URL into it so the
            # umbrella secret keeps a single broker key.
            - name: CELERY_BROKER_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.envFrom.secretName }}
                  key: REDIS_URL
                  optional: true
            {{- range $k, $v := $f.env }}
            - name: {{ $k }}
              value: {{ $v | quote }}
            {{- end }}
          livenessProbe:
            httpGet:
              path: {{ $f.probes.liveness.path }}
              port: http
            initialDelaySeconds: {{ $f.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ $f.probes.liveness.periodSeconds }}
            failureThreshold: {{ $f.probes.liveness.failureThreshold }}
          readinessProbe:
            httpGet:
              path: {{ $f.probes.readiness.path }}
              port: http
            initialDelaySeconds: {{ $f.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ $f.probes.readiness.periodSeconds }}
            failureThreshold: {{ $f.probes.readiness.failureThreshold }}
          resources:
            {{- toYaml $f.resources | nindent 12 }}
{{- end }}
