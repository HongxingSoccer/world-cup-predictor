# Default values for wcp-java-api. Environment-specific overrides
# live in the umbrella chart's values-{env}.yaml.

image:
  registry: ""
  repository: wcp-java-api
  tag: ""
  pullPolicy: IfNotPresent

replicaCount: 2

service:
  type: ClusterIP
  port: 8080

resources:
  requests:
    cpu: 500m
    memory: 512Mi
  limits:
    cpu: 1500m
    memory: 1536Mi

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 8
  targetCPUUtilizationPercentage: 70

podDisruptionBudget:
  enabled: true
  minAvailable: 1

serviceAccount:
  create: true
  name: ""
  # IRSA role ARN — needs read on AWS Secrets Manager only.
  # Terraform output `eks_irsa_role_arn_java_api` slots in here.
  annotations: {}

envFrom:
  configMapName: wcp-config
  secretName: wcp-secrets

env:
  SPRING_PROFILES_ACTIVE: prod
  SERVER_PORT: "8080"
  JAVA_OPTS: "-XX:MaxRAMPercentage=75.0 -XX:+UseG1GC"
  ML_API_BASE_URL: http://wcp-ml-api:8000
  MANAGEMENT_SERVER_PORT: "8080"
  # JWT PEMs come from the projected secret mount below; the app reads them
  # via path env vars instead of inline value, so they aren't tracked in git.
  JWT_PRIVATE_KEY_PATH: /run/secrets/jwt-private.pem
  JWT_PUBLIC_KEY_PATH: /run/secrets/jwt-public.pem

# JWT keys are pulled from AWS Secrets Manager by the umbrella's ExternalSecret
# into the Secret named below; the Deployment projects them as files.
jwtKeys:
  secretName: wcp-jwt-keys
  mountPath: /run/secrets

# Spring Boot's startup is slow (~30-60s cold); give it a wide window before
# the readiness/liveness pair kicks in.
probes:
  startup:
    path: /actuator/health
    initialDelaySeconds: 15
    periodSeconds: 10
    timeoutSeconds: 3
    failureThreshold: 30
  liveness:
    path: /actuator/health
    initialDelaySeconds: 0
    periodSeconds: 30
    timeoutSeconds: 5
    failureThreshold: 3
  readiness:
    path: /actuator/health
    initialDelaySeconds: 0
    periodSeconds: 5
    timeoutSeconds: 3
    failureThreshold: 3

terminationGracePeriodSeconds: 30

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 1000

containerSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: false
  capabilities:
    drop:
      - ALL

topologySpread:
  enabled: true
  maxSkew: 1
  topologyKey: topology.kubernetes.io/zone
  whenUnsatisfiable: ScheduleAnyway

imagePullSecrets: []
nodeSelector: {}
tolerations: []
affinity: {}
