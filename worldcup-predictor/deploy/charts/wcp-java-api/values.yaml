image:
  repository: ghcr.io/CHANGE_ME/wcp-java-api
  tag: latest
  pullPolicy: IfNotPresent

replicaCount: 2

service:
  type: ClusterIP
  port: 8080

resources:
  requests:
    cpu: 200m
    memory: 512Mi
  limits:
    cpu: 1000m
    memory: 1Gi

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 6
  targetCPUUtilizationPercentage: 70

ingress:
  enabled: true
  className: nginx
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
  hosts:
    - host: api.wcp.example
      paths: ["/api"]
  tls:
    - secretName: wcp-java-api-tls
      hosts: ["api.wcp.example"]

env:
  SPRING_PROFILES_ACTIVE: production
