<!doctype html>
<html lang="zh-CN"><head><meta charset="utf-8">
<title>WCP · 红单 · {{ home_team }} {{ home_score }}-{{ away_score }} {{ away_team }}</title>
{% include "_base.css.html" %}
<style>
  .hit-stamp {
    position: absolute;
    top: 32px;
    right: 32px;
    background: #22c55e;
    color: #052e16;
    font-weight: 900;
    font-size: 28px;
    padding: 12px 24px;
    border-radius: 9999px;
    transform: rotate(8deg);
    box-shadow: 0 10px 30px rgba(34, 197, 94, 0.4);
  }
</style>
</head><body><div class="card-shell">

  <div class="hit-stamp">命中 ✓</div>

  <div class="text-sm text-slate-400 tracking-widest mb-6">{{ competition }}</div>

  <div class="flex items-center justify-between mb-12 mt-4">
    <div class="text-center flex-1">
      <div class="text-4xl font-black mb-1">{{ home_team }}</div>
    </div>
    <div class="mx-6 text-center">
      <div class="text-7xl font-black accent-green">{{ home_score }} : {{ away_score }}</div>
      <div class="text-xs text-slate-400 mt-2 tracking-widest">FT</div>
    </div>
    <div class="text-center flex-1">
      <div class="text-4xl font-black mb-1">{{ away_team }}</div>
    </div>
  </div>

  <div class="grid grid-cols-2 gap-4 mb-8">
    <div class="bg-slate-800/60 rounded-xl p-4">
      <div class="text-xs text-slate-400 mb-1">预测结果</div>
      <div class="text-2xl font-bold">{{ predicted_label }}</div>
    </div>
    <div class="bg-slate-800/60 rounded-xl p-4">
      <div class="text-xs text-slate-400 mb-1">实际结果</div>
      <div class="text-2xl font-bold accent-green">{{ actual_label }}</div>
    </div>
  </div>

  {% if streak and streak >= 2 %}
  <div class="mt-auto mb-12">
    <div class="inline-flex items-center px-5 py-3 bg-orange-500/20 border border-orange-500 rounded-xl">
      <span class="text-orange-300 font-bold mr-2">🔥 连红</span>
      <span class="text-3xl font-black accent-amber">{{ streak }}</span>
      <span class="text-sm text-orange-300 ml-2">场</span>
    </div>
  </div>
  {% endif %}

  <span class="brand">WCP · 战绩追踪</span>
  <span class="ts">{{ generated_at }}</span>
</div></body></html>
