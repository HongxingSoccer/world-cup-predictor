{# Shared CSS partial — pulled into every card template via {% include %}.
   Tailwind via CDN so the Playwright headless browser doesn't need a build
   step. Cards are designed dark-on-bright for high contrast on social feeds. #}
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link
  href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;600;700;900&display=swap"
  rel="stylesheet">

<style>
  body {
    font-family: 'Noto Sans SC', system-ui, -apple-system, sans-serif;
    margin: 0;
    padding: 0;
    background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
    color: #f8fafc;
    width: {{ width }}px;
    height: {{ height }}px;
    overflow: hidden;
  }
  .brand {
    position: absolute;
    bottom: 24px;
    left: 24px;
    font-size: 14px;
    color: #94a3b8;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  .ts {
    position: absolute;
    bottom: 24px;
    right: 24px;
    font-size: 14px;
    color: #94a3b8;
  }
  .card-shell {
    width: 100%;
    height: 100%;
    padding: 48px;
    display: flex;
    flex-direction: column;
    box-sizing: border-box;
    position: relative;
  }
  .accent-green { color: #22c55e; }
  .accent-amber { color: #f59e0b; }
  .accent-red { color: #ef4444; }
</style>
