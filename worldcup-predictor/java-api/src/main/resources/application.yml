spring:
  application:
    name: wcp-java-api

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/wcp}
    username: ${SPRING_DATASOURCE_USERNAME:wcp}
    password: ${SPRING_DATASOURCE_PASSWORD:wcp}
    driver-class-name: org.postgresql.Driver

  jpa:
    # Schema is owned by the Python Alembic migrations — Java never autocreates.
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
        format_sql: false
    open-in-view: false

  data:
    redis:
      host: ${SPRING_REDIS_HOST:localhost}
      port: ${SPRING_REDIS_PORT:6379}

server:
  port: 8080
  forward-headers-strategy: framework
  error:
    include-stacktrace: never

# --- WCP-specific configuration (binds onto WcpProperties) ---
wcp:
  jwt:
    private-key-path: ${JWT_PRIVATE_KEY_PATH:/run/secrets/jwt-private.pem}
    public-key-path:  ${JWT_PUBLIC_KEY_PATH:/run/secrets/jwt-public.pem}
    access-token-ttl-minutes: 120     # 2h
    refresh-token-ttl-days: 30
    issuer: wcp-api

  ml-api:
    base-url: ${ML_API_BASE_URL:http://localhost:8000}
    api-key: ${ML_API_KEY:}
    connect-timeout-ms: 5000
    read-timeout-ms: 10000

  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:*}

  share:
    base-url: ${SHARE_BASE_URL:http://localhost:8080/s/}

  # Stripe Checkout integration. Leave secret-key blank in dev to keep
  # using the existing stub flow. With `sk_test_...` set, /subscriptions/create
  # for channel=stripe hits the real Stripe API and returns the Checkout
  # Session URL for the frontend to open.
  stripe:
    secret-key: ${STRIPE_SECRET_KEY:}
    webhook-secret: ${STRIPE_WEBHOOK_SECRET:}
    success-url: ${STRIPE_SUCCESS_URL:http://localhost/profile?subscribed=1}
    cancel-url: ${STRIPE_CANCEL_URL:http://localhost/subscribe?cancelled=1}

  payments:
    # Alipay / WeChat Pay SDKs are not yet integrated; the callback
    # signature check currently accepts any non-empty payload (PaymentService.verifySignature
    # was a Phase-3 stub). Until those SDKs land, ANY environment that's
    # reachable from the public internet must keep this `false` — leaving
    # it `true` exposes /api/v1/payments/callback/{alipay,wechat_pay} to
    # forged callbacks that can mark an order paid without payment.
    #
    # Local dev / test profiles override this to `true` so the existing
    # test suite keeps exercising the (stub) flow.
    enable-cn-channels: ${WCP_ENABLE_CN_PAYMENTS:false}

# --- Springdoc / Swagger UI ---
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        # `prometheus` exposes /actuator/prometheus for the metrics scraper.
        # `metrics` is the lower-level JSON view; useful for ad-hoc curling.
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: when_authorized
  metrics:
    tags:
      # Bake the Spring profile into every metric so Prometheus scrapes
      # cleanly separate dev / staging / prod time-series.
      application: wcp-java-api
      profile: ${SPRING_PROFILES_ACTIVE:default}

logging:
  level:
    root: INFO
    org.springframework.web: INFO
    com.wcp: ${WCP_LOG_LEVEL:INFO}
