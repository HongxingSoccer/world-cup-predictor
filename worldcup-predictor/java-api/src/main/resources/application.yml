spring:
  application:
    name: wcp-java-api

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/wcp}
    username: ${SPRING_DATASOURCE_USERNAME:wcp}
    password: ${SPRING_DATASOURCE_PASSWORD:wcp}
    driver-class-name: org.postgresql.Driver

  jpa:
    # Schema is owned by the Python Alembic migrations — Java never autocreates.
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
        format_sql: false
    open-in-view: false

  data:
    redis:
      host: ${SPRING_REDIS_HOST:localhost}
      port: ${SPRING_REDIS_PORT:6379}

server:
  port: 8080
  forward-headers-strategy: framework
  error:
    include-stacktrace: never

# --- WCP-specific configuration (binds onto WcpProperties) ---
wcp:
  jwt:
    private-key-path: ${JWT_PRIVATE_KEY_PATH:/run/secrets/jwt-private.pem}
    public-key-path:  ${JWT_PUBLIC_KEY_PATH:/run/secrets/jwt-public.pem}
    access-token-ttl-minutes: 120     # 2h
    refresh-token-ttl-days: 30
    issuer: wcp-api

  ml-api:
    base-url: ${ML_API_BASE_URL:http://localhost:8000}
    api-key: ${ML_API_KEY:}
    connect-timeout-ms: 5000
    read-timeout-ms: 10000

  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:*}

  share:
    base-url: ${SHARE_BASE_URL:http://localhost:8080/s/}

# --- Springdoc / Swagger UI ---
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when_authorized

logging:
  level:
    root: INFO
    org.springframework.web: INFO
    com.wcp: ${WCP_LOG_LEVEL:INFO}
